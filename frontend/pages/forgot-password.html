<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password</title>

  
  <link rel="stylesheet" href="../src/output.css">
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">

  <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-white mb-6">
      Forgot Password
    </h2>

    <p class="text-gray-400 text-sm text-center mb-6">
      Enter your registered email and we will send you a reset link.
    </p>

    <!-- Form -->
    <form id="forgotForm" class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">Email</label>

        <input
          type="email"
          id="email"
          required
          placeholder="Enter your email"
          class="w-full px-4 py-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-indigo-400"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded font-semibold"
      >
        Send Reset Link
      </button>

    </form>

    <!-- Loading -->
    <p id="loading" class="text-center text-gray-400 mt-4 hidden">
      Sending email...
    </p>

    <!-- Message -->
    <p id="message" class="text-center mt-4 text-sm"></p>

    <!-- Back to login -->
    <p class="mt-6 text-center text-sm text-gray-400">
      Remember your password?
      <a href="index.html" class="text-indigo-400 hover:text-indigo-300">
        Login
      </a>
    </p>

  </div>

  <!-- JS -->
  <script src="../js/forgotPassword.js"></script>

</body>
</html>
