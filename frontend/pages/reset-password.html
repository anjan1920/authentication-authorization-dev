<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="../src/output.css">
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">

  <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-white mb-6">
      Reset Password
    </h2>

    <p class="text-gray-400 text-sm text-center mb-6">
      Enter your new password.
    </p>

    <!-- Form -->
    <form id="resetForm" class="space-y-4">

      <!-- New Password -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">
          New Password
        </label>

        <input
          type="password"
          id="newPassword"
          required
          placeholder="Enter new password"
          class="w-full px-4 py-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-indigo-400"
        >
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">
          Confirm Password
        </label>

        <input
          type="password"
          id="confirmPassword"
          required
          placeholder="Confirm password"
          class="w-full px-4 py-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-indigo-400"
        >
      </div>

      <!-- Button -->
      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded font-semibold"
      >
        Reset Password
      </button>

    </form>

    <!-- Loading -->
    <p id="loading" class="text-center text-gray-400 mt-4 hidden">
      Updating password...
    </p>

    <!-- Message -->
    <p id="message" class="text-center mt-4 text-sm"></p>

  </div>

  <script src="../js/resetPassword.js"></script>

</body>
</html>
