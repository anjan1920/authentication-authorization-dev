<!DOCTYPE html>
<html class="h-full bg-gray-900">
<head>
  <title>Email Verification</title>
  <link href="../src/output.css" rel="stylesheet">
</head>

<body class="h-full">

<div class="flex min-h-full flex-col justify-center items-center px-6 py-12">

  <div class="sm:w-full sm:max-w-sm text-center">

    <h2 class="text-2xl font-bold text-white mb-6">
      Email Verification
    </h2>

    <!-- Loading -->
    <div id="loading" class="flex flex-col items-center gap-3">

      <svg class="animate-spin h-6 w-6 text-indigo-400"
      xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

        <circle class="opacity-25" cx="12" cy="12" r="10"
        stroke="currentColor" stroke-width="4"></circle>

        <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8v4l3-3-3-3v4A10 10 0 002 12h2z">
        </path>

      </svg>

      <p class="text-gray-300 text-sm">
        Verifying your email...
      </p>

    </div>

    <!-- Result Message -->
    <div id="result" class="hidden text-gray-200"></div>

  </div>

</div>

<script src="../js/emailVerify.js"></script>

</body>
</html>
